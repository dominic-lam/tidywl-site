  <style>
    /* ── THEME TOKENS ── */
    :root {

    /* Follow OS dark mode unless user forced light */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #1c1a18;
        --bg-alt: #161412;
        --bg-card: #24211e;
        --text: #f5efe7;
        --text-secondary: #c9bfb4;
        --text-muted: #a89f97;
        --text-subtle: #8a807a;
        --border: #3a342f;
        --border-subtle: #2a2724;
        --border-strong: #4a433c;
        --star: #ffb400;
        --stars-empty: #6d655f;
        --highlight-bg: linear-gradient(180deg, #2a1c1a 0%, #24211e 100%);
        --highlight-border: #4a2a27;
        --ghost-hover-bg: #24211e;
        --ghost-hover-border: #6d655f;
      }
    }

    /* Manual override wins over OS preference */
    :root[data-theme="dark"] {
      --bg: #1c1a18;
      --bg-alt: #161412;
      --bg-card: #24211e;
      --text: #f5efe7;
      --text-secondary: #c9bfb4;
      --text-muted: #a89f97;
      --text-subtle: #8a807a;
      --border: #3a342f;
      --border-subtle: #2a2724;
      --border-strong: #4a433c;

    /* ── THEME TOGGLE ── */

    .theme-toggle:hover { border-color: var(--border-strong); }
    .theme-toggle svg { width: 18px; height: 18px; display: none; }
    /* Default (no data-theme): derive from OS preference */
    .theme-toggle .icon-sun { display: block; }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .theme-toggle .icon-sun { display: none; }
      :root:not([data-theme="light"]) .theme-toggle .icon-moon { display: block; }
    }
    :root[data-theme="light"] .theme-toggle .icon-sun { display: block; }
    :root[data-theme="light"] .theme-toggle .icon-moon { display: none; }
    :root[data-theme="dark"] .theme-toggle .icon-sun { display: none; }

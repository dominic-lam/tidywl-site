<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — TidyWL</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <link rel="canonical" href="{{ site.url }}{{ page.url | replace:'index.html','' }}">
  <link rel="icon" type="image/png" href="/assets/icon128.png">

  <!-- Open Graph -->
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:title" content="{{ page.title }} — TidyWL">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:image" content="{{ site.url }}{{ page.og_image | default: '/assets/og-image.png' }}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title }} — TidyWL">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image" content="{{ site.url }}{{ page.og_image | default: '/assets/og-image.png' }}">

  <link rel="alternate" type="application/rss+xml" title="TidyWL blog" href="{{ site.url }}/blog/feed.xml">

  {% include fonts.html %}
  {% include theme-init.html %}

  {% if page.faq %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {% for item in page.faq %}
      {
        "@type": "Question",
        "name": {{ item.q | jsonify }},
        "acceptedAnswer": {
          "@type": "Answer",
          "text": {{ item.a | jsonify }}
        }
      }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ]
  }
  </script>
  {% endif %}

  {% include styles.html %}
  {% include styles-blog.html %}
</head>
<body>

  {% include theme-toggle.html %}

  {{ content }}

  {% include footer.html %}

  {% include scripts.html %}

</body>
</html>
